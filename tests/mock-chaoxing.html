<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>模拟学习通课程页面 - StudyBuddy 测试</title>
  <style>
    body { font-family: 'Microsoft YaHei', sans-serif; padding: 20px; background: #f5f5f5; }
    .course-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 10px 0; }
    .course-name { font-size: 16px; font-weight: bold; color: #333; }
    .teacher { font-size: 13px; color: #666; margin-top: 4px; }
    .teacher-name { color: #1890ff; }
    .workItem { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 10px; margin: 8px 0; }
    .work-title { font-size: 14px; font-weight: 600; }
    .deadline { font-size: 12px; color: #ff4d4f; }

<body>
  <h2>我的课程</h2>

      <span class="teacher-name">张老师</span>

    <a href="/course/123">进入课程</a>

  <div class="course-card">
    <div class="course-name">Python数据分析</div>
    <div class="teacher">
      <span class="teacher-name">李教授</span>

  </div>

  <!-- 模拟作业列表 -->

    <div class="work-title">实验一：Java面向对象编程</div>
    <div class="deadline">截止时间: 2026-06-15 23:59</div>

  <div class="workItem">

    <div class="deadline">截止时间: 2026-06-20 23:59</div>

  <div class="chapter_item">
    <span class="chapter_name">第一章：Java基础语法</span>
  </div>
  <div class="chapter_item">
    <span class="chapter_name">第二章：面向对象编程</span>
  </div>

  <p style="margin-top:40px; color:#999; font-size:12px">
    这是 StudyBuddy 扩展测试页面。扩展应该能检测到 2 门课程、2 份作业。

</html>
